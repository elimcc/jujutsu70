  header: "\n&#001CFF&l&m----&r &#001CFF&lARENA LIST &#001CFF&l&m----&r"
  entry-waiting: " &#001CFF&l{arena} &7- &aWaiting &7({current}/{max})"
  entry-lobby: " &#001CFF&l{arena} &7- &eIn Lobby &7({current}/{max})"
  entry-ingame: " &#001CFF&l{arena} &7- &cIn Game &7({current}/{max})"
  entry-setup: " &#001CFF&l{arena} &7- &7Setting Up"
  no-arenas: "&7No arenas have been created yet."
  footer: "&#001CFF&l&m---------------------------&r\n"

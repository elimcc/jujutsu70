# HungerGames Messages
# Supports color codes & hex colors &#RRGGBB
# Prefix is automatically prepended to all messages

prefix: "&#001CFF&lʜᴜɴɢᴇʀɢᴀᴍᴇѕ &7→ "

# -----------------------------------------------
# General
# -----------------------------------------------
general:
  no-permission: "&cYou don't have permission to do that."
